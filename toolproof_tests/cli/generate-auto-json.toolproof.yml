name: CLI generate --auto --format json

steps:
  - I run "cp -R %test_sites%/sendit-astro-template src"
  - ref: ./core/run_gadget_cli.toolproof.yml
  - I run "npm -s run gadget -- generate src --auto --format json"
  - step: I read the file "src/cloudcannon.config.json"
  - stdout should contain "$schema"
  - stdout should contain "collections_config"
